<div class="p-4 md:p-8 min-h-screen animate-fade-in-up">
    <!-- Header & Global Filters -->
    <div class="mb-10 glass-effect p-4 md:p-8 rounded-[32px] border border-main shadow-2xl relative z-50">
        <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-6 md:gap-8">
            <div class="space-y-2">
                <h1 class="text-4xl md:text-5xl font-[900] text-main tracking-tighter flex flex-wrap items-center gap-2 md:gap-4">
                    <span class="p-3 bg-gradient-to-br from-red-500 to-red-700 rounded-2xl shadow-xl shadow-red-500/20">
                        <svg class="w-8 h-8 md:w-10 md:h-10 text-main" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z">
                            </path>
                        </svg>
                    </span>
                    Dashboard <span
                        class="bg-gradient-to-r from-red-500 to-orange-400 bg-clip-text text-transparent">Red+</span>
                </h1>
                <p class="text-muted font-medium flex items-center text-lg">
                    <svg class="w-5 h-5 mr-3 text-red-500/50" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd"
                            d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z"
                            clip-rule="evenodd"></path>
                    </svg>
                    Analítica de contenido y audiencia
                </p>
            </div>

            <!-- Main Filters Component -->
            <app-dashboard-filters [options]="filtersOptions" [filters]="filters" [visibleFilters]="visibleFilters"
                (filterChange)="onFilterChange($event)" (clear)="onClearFilters()">
            </app-dashboard-filters>
        </div>
    </div>

    <!-- Tab Navigation - Premium Capsule -->
    <div class="flex flex-wrap items-center gap-2 mb-10 glass-effect p-2 rounded-2xl border border-muted max-w-fit shadow-xl">
        <button (click)="setTab('overview')" [class.tab-active]="activeTab === 'overview'" class="tab-btn group">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z">
                </path>
            </svg>
            Resumen
        </button>
        <button (click)="setTab('content')" [class.tab-active]="activeTab === 'content'" class="tab-btn group">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10l4 4v10a2 2 0 01-2 2z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 2v4a2 2 0 002 2h4"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8h3m-3 4h6"></path>
            </svg>
            Contenido
        </button>
        <button (click)="setTab('entities')" [class.tab-active]="activeTab === 'entities'" class="tab-btn group">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z">
                </path>
            </svg>
            Entidades
        </button>
        <button (click)="setTab('reach')" [class.tab-active]="activeTab === 'reach'" class="tab-btn group">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
            </svg>
            Alcance
        </button>
        <button (click)="setTab('audience')" [class.tab-active]="activeTab === 'audience'" class="tab-btn group">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z">
                </path>
            </svg>
            Audiencia
        </button>
    </div>

    <!-- Standard Loading State (for initial load) -->
    <div *ngIf="isLoading" class="space-y-8 animate-pulse">
        <!-- KPI Skeletons -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-6">
            <div *ngFor="let i of [1,2,3,4,5,6]"
                class="glass-effect p-8 rounded-3xl border border-muted h-36 relative overflow-hidden">
                <div class="skeleton skeleton-text w-24 bg-white/10 rounded-lg"></div>
                <div class="skeleton skeleton-title w-16 bg-white/20 rounded-lg h-10"></div>
                <div class="skeleton skeleton-text w-32 mt-auto bg-white/5 rounded-lg"></div>
            </div>
        </div>
        <!-- Main Content Skeletons -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 glass-effect rounded-[32px] border border-muted p-8 h-[500px]">
                <div class="skeleton skeleton-title w-64 mb-8 bg-white/10 h-12 rounded-2xl"></div>
                <div class="skeleton skeleton-chart bg-white/5 h-[350px] rounded-3xl"></div>
            </div>
            <div class="space-y-6">
                <div *ngFor="let i of [1,2,3,4]" class="glass-effect rounded-2xl border border-muted p-6 h-32">
                    <div class="skeleton skeleton-text w-20 bg-white/10"></div>
                    <div class="skeleton skeleton-title w-32 bg-white/20"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Content Tabs -->
    <div [hidden]="isLoading || hasError" class="animate-fade-in-up">
        <app-overview-tab *ngIf="activeTab === 'overview'" [data]="overviewData"
            (drillDown)="onDrillDown($event)"></app-overview-tab>
        <app-content-tab *ngIf="activeTab === 'content'" [data]="contentData"
            (drillDown)="onDrillDown($event)"></app-content-tab>
        <app-entities-tab *ngIf="activeTab === 'entities'" [data]="entitiesData" [currentFilters]="filters"
            (drillDown)="onDrillDown($event)"></app-entities-tab>
        <app-reach-tab *ngIf="activeTab === 'reach'" [data]="reachData"
            (drillDown)="onDrillDown($event)"></app-reach-tab>
        <app-audience-tab *ngIf="activeTab === 'audience'" [data]="audienceData"
            (drillDown)="onDrillDown($event)"></app-audience-tab>
    </div>

    <!-- Error State -->
    <div *ngIf="hasError && !isLoading"
        class="glass-effect border-2 border-red-500/20 p-16 rounded-[40px] text-center max-w-2xl mx-auto my-20 shadow-2xl">
        <div class="w-24 h-24 bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-8 animate-bounce">
            <svg class="w-12 h-12 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                </path>
            </svg>
        </div>
        <h2 class="text-3xl font-black text-main mb-4">Error de Sincronización</h2>
        <p class="text-muted font-medium mb-10 text-lg">No pudimos establecer conexión con la red de datos. Por
            favor, intenta de nuevo en unos momentos.</p>
        <button (click)="loadData()"
            class="px-10 py-4 bg-gradient-to-r from-red-600 to-red-500 text-main font-black rounded-2xl shadow-xl shadow-red-500/30 hover:shadow-red-500/50 hover:scale-105 transition-all active:transform active:scale-95 text-lg">
            Reintentar Conexión
        </button>
    </div>

</div>

<style>
    .tab-btn {
        @apply flex items-center px-6 py-3 rounded-xl text-sm font-black text-muted transition-all duration-300;
    }

    .tab-btn:hover {
        @apply text-main bg-white/10;
        transform: translateY(-2px);
    }

    .tab-active {
        background: linear-gradient(135deg, var(--primary), var(--secondary)) !important;
        color: #ffffff !important;
        box-shadow: 0 8px 25px var(--primary-glow) !important;
        transform: scale(1.05);
    }

    .tab-active svg {
        @apply text-main;
    }
</style>
