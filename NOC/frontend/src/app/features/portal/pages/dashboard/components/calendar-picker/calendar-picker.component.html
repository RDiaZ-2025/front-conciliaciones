<div class="glass-effect rounded-2xl p-4 w-72 select-none animate-fade-in-up">
    <!-- Header with Selects -->
    <div class="flex items-center justify-between mb-4 gap-2">
        <select [value]="viewDate.getMonth()" (change)="onMonthChange($event)"
            class="bg-premium-card border border-white/10 text-xs font-black text-main rounded-lg p-2 focus:ring-4 focus:ring-primary/20 cursor-pointer hover:bg-premium-hover transition-all flex-grow">
            <option *ngFor="let month of months; let i = index" [value]="i"
                class="bg-slate-900 text-white dark:bg-slate-800">{{ month }}</option>
        </select>

        <select [value]="viewDate.getFullYear()" (change)="onYearChange($event)"
            class="bg-premium-card border border-white/10 text-xs font-black text-main rounded-lg p-2 focus:ring-4 focus:ring-primary/20 cursor-pointer hover:bg-premium-hover transition-all w-24">
            <option *ngFor="let year of years" [value]="year" class="bg-slate-900 text-white dark:bg-slate-800">{{ year
                }}</option>
        </select>
    </div>

    <!-- Navigation Arrows -->
    <div class="flex items-center justify-between mb-4 px-1">
        <button (click)="changeMonth(-1)"
            class="p-2 hover:bg-primary/20 text-slate-500 hover:text-white rounded-xl transition-all active:scale-90">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path>
            </svg>
        </button>
        <div class="text-[10px] font-black uppercase tracking-widest text-slate-500">{{ months[viewDate.getMonth()] }}
            {{ viewDate.getFullYear() }}</div>
        <button (click)="changeMonth(1)"
            class="p-2 hover:bg-primary/20 text-slate-500 hover:text-white rounded-xl transition-all active:scale-90">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path>
            </svg>
        </button>
    </div>

    <!-- Week Days -->
    <div class="grid grid-cols-7 gap-1 mb-2">
        <div *ngFor="let day of ['LU', 'MA', 'MI', 'JU', 'VI', 'SA', 'DO']"
            class="text-[9px] font-black text-slate-600 text-center py-1">
            {{ day }}
        </div>
    </div>

    <!-- Calendar Days -->
    <div class="grid grid-cols-7 gap-1">
        <div *ngFor="let cell of emptyCells" class="h-8"></div>
        <div *ngFor="let day of daysInMonth" (click)="selectDay(day)"
            class="h-8 flex items-center justify-center text-xs font-black rounded-xl cursor-pointer transition-all active:scale-95"
            [ngClass]="{
                'text-muted hover:bg-premium-hover hover:text-main': !isSelected(day) && !isToday(day),
                'text-primary bg-primary/10 border border-primary/20': isToday(day) && !isSelected(day),
                'bg-primary text-white shadow-[0_4px_15px_var(--primary-glow)]': isSelected(day)
             }">
            {{ day }}
        </div>
    </div>
</div>
