<p-toast></p-toast>
<p-confirmDialog>
  <ng-template pTemplate="message" let-message>
    <div class="flex align-items-center gap-3 w-full">
      <lucide-icon name="alert-triangle" class="text-red-500 text-3xl" style="flex-shrink: 0;"></lucide-icon>
      <span class="text-sm text-700 font-semibold">{{ message.message }}</span>
    </div>
  </ng-template>
</p-confirmDialog>

<div class="flex flex-column gap-4 p-4">
  <app-page-header title="Gestión de Usuarios" subtitle="Gestión avanzada de usuarios y permisos" icon="shield">
    <p-iconField iconPosition="left">
      <p-inputIcon>
        <lucide-icon name="search"></lucide-icon>
      </p-inputIcon>
      <input pInputText type="text" [formControl]="searchControl" placeholder="Buscar usuario..."
        class="w-full sm:w-20rem" />
    </p-iconField>
    <p-button (onClick)="openUserDialog()"><lucide-icon name="plus" class="mr-2"></lucide-icon>Nuevo Usuario</p-button>
  </app-page-header>

  <div class="card border-round-2xl shadow-1 surface-card overflow-hidden">
    <!-- Table -->
    <p-table #dt [value]="users" [loading]="loading()" [paginator]="true" [rows]="10" [rowsPerPageOptions]="[5, 10, 25]"
      [globalFilterFields]="['name', 'email', 'teamName']" [filterDelay]="0" styleClass="p-datatable-lg"
      responsiveLayout="scroll">

      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="name">Usuario <p-sortIcon field="name"></p-sortIcon></th>
          <th pSortableColumn="email">Email <p-sortIcon field="email"></p-sortIcon></th>
          <th pSortableColumn="teamName">Equipo <p-sortIcon field="teamName"></p-sortIcon></th>
          <th>Permisos</th>
          <th pSortableColumn="status" class="text-center">Estado <p-sortIcon field="status"></p-sortIcon></th>
          <th class="text-center">Acciones</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-user>
        <tr>
          <td>
            <div class="flex align-items-center gap-3">
              <div class="flex align-items-center justify-content-center p-2 border-round bg-primary-50 text-primary">
                <lucide-icon name="user"></lucide-icon>
              </div>
              <span class="font-medium">{{ user.name }}</span>
            </div>
          </td>
          <td class="text-600">{{ user.email }}</td>
          <td>
            <span *ngIf="user.teamName" class="font-medium text-900">{{ user.teamName }}</span>
            <span *ngIf="!user.teamName" class="text-500 italic text-sm">Sin equipo</span>
          </td>
          <td>
            <div class="flex flex-wrap gap-2">
              <p-tag *ngFor="let perm of user.permissions" [value]="getPermissionLabel(perm)"
                [severity]="getPermissionSeverity(perm)" [rounded]="true">
              </p-tag>
              <span *ngIf="!user.permissions || user.permissions.length === 0" class="text-500 italic text-sm">Sin
                permisos</span>
            </div>
          </td>
          <td class="text-center">
            <p-tag [value]="user.status === 1 ? 'Activo' : 'Inactivo'"
              [severity]="user.status === 1 ? 'success' : 'danger'" [rounded]="true">
            </p-tag>
          </td>
          <td class="text-center">
            <div class="flex justify-content-center gap-2">
              <p-button (onClick)="openUserDialog(user)" pTooltip="Editar usuario" tooltipPosition="top" [rounded]="true" [text]="true" severity="primary"><lucide-icon name="pencil"></lucide-icon>
              </p-button>
              <p-button
                (onClick)="toggleUserStatus(user)" [pTooltip]="user.status === 1 ? 'Desactivar' : 'Activar'"
                tooltipPosition="top" [rounded]="true" [text]="true"
                [severity]="user.status === 1 ? 'warn' : 'success'">
                <lucide-icon [name]="user.status === 1 ? 'ban' : 'check-circle'"></lucide-icon>
              </p-button>
              <p-button (onClick)="viewHistory(user)" pTooltip="Ver historial" tooltipPosition="top" [rounded]="true" [text]="true" severity="info"><lucide-icon name="history"></lucide-icon>
              </p-button>
            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="6" class="text-center p-4 text-600">
            No se encontraron usuarios que coincidan con la búsqueda.
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>
