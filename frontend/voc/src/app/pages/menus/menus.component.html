<div class="flex flex-column gap-4 p-4 fadein animation-duration-300">
    <app-page-header title="Gestión de Menú" subtitle="Administración de la estructura de navegación" icon="list">
        <p-button (onClick)="openNew()"><lucide-icon name="plus" class="mr-2"></lucide-icon>Nuevo Ítem</p-button>
        <p-button [text]="true" [rounded]="true" (onClick)="loadMenuItems()"><lucide-icon name="refresh-cw"></lucide-icon></p-button>
    </app-page-header>
    <p-toast></p-toast>
    <div class="flex align-items-center gap-3 surface-card p-3 border-round border-1 surface-border shadow-2">
        <span class="font-semibold text-main text-sm">Proyecto:</span>
        <p-select [ngModel]="selectedProject()" (ngModelChange)="onProjectChange($event)" [options]="projectOptions"
            optionLabel="label" optionValue="value" class="w-15rem" styleClass="w-full">
        </p-select>
    </div>
    <div class="card p-4 surface-card border-round shadow-2 overflow-x-auto">
        <p-treeTable [value]="menuItems()" [loading]="loading()" styleClass="p-treetable-sm"
            [tableStyle]="{'min-width': '50rem'}">
            <ng-template pTemplate="header">
                <tr>
                    <th>Etiqueta</th>
                    <th>Icono</th>
                    <th>Ruta</th>
                    <th>Permiso</th>
                    <th>Orden</th>
                    <th>Activo</th>
                    <th>Acciones</th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-rowNode let-rowData="rowData">
                <tr [ttRow]="rowNode">
                    <td>
                        <p-treeTableToggler [rowNode]="rowNode"></p-treeTableToggler>
                        {{ rowData.label }}
                    </td>
                    <td>
                        <lucide-icon [name]="rowData.icon" *ngIf="rowData.icon"></lucide-icon>
                        <span *ngIf="rowData.icon" class="ml-2 text-sm text-500">{{ rowData.icon }}</span>
                    </td>
                    <td><span class="text-sm font-mono surface-100 p-1 border-round" *ngIf="rowData.route">{{
                            rowData.route }}</span></td>
                    <td>
                        <span class="text-sm surface-100 p-1 border-round" *ngIf="rowData.permissionId">
                            {{ getPermissionName(rowData.permissionId) }}
                        </span>
                    </td>
                    <td>{{ rowData.displayOrder }}</td>
                    <td>
                        <lucide-icon [name]="rowData.isActive ? 'check-circle' : 'x-circle'" [ngClass]="rowData.isActive ? 'text-green-500' : 'text-red-500'"></lucide-icon>
                    </td>
                    <td>
                        <div class="flex gap-2">
                            <p-button [text]="true" [rounded]="true" severity="info" (onClick)="editItem(rowData)"><lucide-icon name="pencil"></lucide-icon></p-button>
                            <p-button [text]="true" [rounded]="true" severity="danger" (onClick)="deleteItem(rowData)"><lucide-icon name="trash-2"></lucide-icon></p-button>
                        </div>
                    </td>
                </tr>
            </ng-template>
            <ng-template pTemplate="emptymessage">
                <tr>
                    <td colspan="6" class="text-center p-4">No hay ítems de menú definidos.</td>
                </tr>
            </ng-template>
        </p-treeTable>
    </div>

    <app-menu-dialog [visible]="dialogVisible()" (visibleChange)="dialogVisible.set($event)" [item]="editingItem()"
        [parentOptions]="parentOptions()" [permissionOptions]="permissionOptions()" [saving]="saving()"
        (save)="saveItem($event)">
    </app-menu-dialog>
</div>
