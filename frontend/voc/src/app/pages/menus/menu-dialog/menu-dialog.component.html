<p-dialog [visible]="visible" (visibleChange)="visibleChange.emit($event)"
    [header]="item ? 'Editar Ítem' : 'Nuevo Ítem'" [modal]="true" [style]="{width: '600px'}"
    [breakpoints]="{'960px': '75vw', '640px': '95vw'}">

    <form [formGroup]="form" class="formgrid grid pt-4">
        <div class="field col-12">
            <p-floatlabel variant="in">
                <input pInputText id="label" formControlName="label" autocomplete="off" class="w-full" />
                <label for="label">Etiqueta</label>
            </p-floatlabel>
        </div>

        <div class="field col-12">
            <p-floatlabel variant="in">
                <p-select id="permissionId" formControlName="permissionId" [options]="permissionOptions"
                    optionLabel="label" optionValue="value" [showClear]="true" class="w-full" appendTo="body"
                    styleClass="w-full">
                </p-select>
                <label for="permissionId">Permiso Requerido</label>
            </p-floatlabel>
        </div>

        <div class="field col-12 md:col-6">
            <p-floatlabel variant="in">
                <lucide-icon [name]="form.get('icon')?.value" style="position: absolute; right: 0.75rem; top: 50%; margin-top: -0.5rem; z-index: 1;"></lucide-icon>
                <input pInputText id="icon" formControlName="icon" autocomplete="off" class="w-full" />
                <label for="icon">Icono (ej. users, settings)</label>
            </p-floatlabel>
            <small class="text-secondary block mt-1">
                Busca nombres de iconos en <a href="https://lucide.dev/icons" target="_blank" rel="noopener noreferrer" class="text-primary font-medium underline">Lucide Icons</a>
            </small>
        </div>

        <div class="field col-12 md:col-6">
            <p-floatlabel variant="in">
                <input pInputText id="route" formControlName="route" autocomplete="off" class="w-full" />
                <label for="route">Ruta</label>
            </p-floatlabel>
        </div>

        <div class="field col-12">
            <p-floatlabel variant="in">
                <p-select id="parentId" formControlName="parentId" [options]="parentOptions" optionLabel="label"
                    optionValue="value" [showClear]="true" class="w-full" appendTo="body" styleClass="w-full">
                </p-select>
                <label for="parentId">Padre</label>
            </p-floatlabel>
        </div>

        <div class="field col-12 md:col-6">
            <p-floatlabel variant="in">
                <p-inputNumber id="displayOrder" formControlName="displayOrder" [showButtons]="true" [min]="0"
                    class="w-full" styleClass="w-full"></p-inputNumber>
                <label for="displayOrder">Orden</label>
            </p-floatlabel>
        </div>

        <div class="field col-12 md:col-6 flex align-items-center">
            <div class="field-checkbox m-0">
                <p-checkbox formControlName="isActive" [binary]="true" inputId="isActive"></p-checkbox>
                <label for="isActive" class="ml-2 cursor-pointer">Activo</label>
            </div>
        </div>
    </form>

    <ng-template pTemplate="footer">
        <button pButton class="p-button-text" (click)="visibleChange.emit(false)"><lucide-icon name="x" class="mr-2"></lucide-icon>Cancelar</button>
        <button pButton class="p-button-text" (click)="onSubmit()" [loading]="saving"><lucide-icon name="check" class="mr-2"></lucide-icon>Guardar</button>
    </ng-template>
</p-dialog>
