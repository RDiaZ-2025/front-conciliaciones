<div class="p-4">
    <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-column gap-4">
        <div class="flex flex-column gap-2">
            <label for="wsp_business_campaignName" class="font-bold">Nombre de la Campaña</label>
            <input pInputText class="w-full" id="wsp_business_campaignName" formControlName="wsp_business_campaignName" />
            <small class="text-red-500" *ngIf="form.get('wsp_business_campaignName')?.invalid && form.get('wsp_business_campaignName')?.touched">
                El nombre de la campaña es requerido
            </small>
        </div>

        <div class="flex flex-column gap-2">
            <label for="wsp_business_message" class="font-bold">Mensaje</label>
            <textarea pTextarea class="w-full" id="wsp_business_message" formControlName="wsp_business_message" rows="5" class="w-full"></textarea>
            <small class="text-red-500" *ngIf="form.get('wsp_business_message')?.invalid && form.get('wsp_business_message')?.touched">
                El mensaje es requerido
            </small>
        </div>

        <div class="flex flex-column gap-2">
            <label class="font-bold">Imágenes (Opcional)</label>
            <p-fileUpload #imagesUploader
                mode="basic" 
                chooseLabel="Seleccionar Imágenes" 
                name="wsp_business_images"
                accept="image/*" 
                maxFileSize="1000000" 
                (onSelect)="onUpload($event, 'wsp_business_images', imagesUploader)"
                [auto]="true">
            </p-fileUpload>
            <div *ngIf="getUploadedFile('wsp_business_images')" class="flex align-items-center justify-content-between mt-2 p-2 surface-ground border-round">
                <div class="flex align-items-center gap-2 overflow-hidden">
                    <img *ngIf="getUploadedFile('wsp_business_images').safeUrl" [src]="getUploadedFile('wsp_business_images').safeUrl | cachedImage" alt="Preview" style="max-height: 50px; max-width: 50px; object-fit: contain;" class="border-round" />
                    <span class="text-sm text-700 text-overflow-ellipsis overflow-hidden white-space-nowrap font-medium">{{ getUploadedFile('wsp_business_images').name }}</span>
                </div>
                <p-button icon="pi pi-times" [rounded]="true" [text]="true" severity="danger" (onClick)="removeFile('wsp_business_images', imagesUploader)"></p-button>
            </div>
        </div>

        <div class="flex flex-column gap-2">
            <label class="font-bold">Video (Opcional)</label>
            <p-fileUpload #videoUploader
                mode="basic" 
                chooseLabel="Seleccionar Video" 
                name="wsp_business_video"
                accept="video/*" 
                maxFileSize="10000000" 
                (onSelect)="onUpload($event, 'wsp_business_video', videoUploader)"
                [auto]="true">
            </p-fileUpload>
            <div *ngIf="getUploadedFile('wsp_business_video')" class="flex align-items-center justify-content-between mt-2 p-2 surface-ground border-round">
                <div class="flex align-items-center gap-2 overflow-hidden">
                    <video *ngIf="getUploadedFile('wsp_business_video').safeUrl" [src]="getUploadedFile('wsp_business_video').safeUrl" style="max-height: 50px; max-width: 50px; object-fit: cover;" class="border-round"></video>
                    <span class="text-sm text-700 text-overflow-ellipsis overflow-hidden white-space-nowrap font-medium">{{ getUploadedFile('wsp_business_video').name }}</span>
                </div>
                <p-button icon="pi pi-times" [rounded]="true" [text]="true" severity="danger" (onClick)="removeFile('wsp_business_video', videoUploader)"></p-button>
            </div>
        </div>

        <div class="flex flex-column gap-2">
            <label class="font-bold">Base de Datos (CSV)</label>
            <p-fileUpload #csvUploader
                mode="basic" 
                chooseLabel="Seleccionar CSV" 
                name="wsp_business_csv"
                accept=".csv" 
                maxFileSize="5000000" 
                (onSelect)="onUpload($event, 'wsp_business_csv', csvUploader)"
                [auto]="true">
            </p-fileUpload>
            <div *ngIf="getUploadedFile('wsp_business_csv')" class="flex align-items-center justify-content-between mt-2 p-2 surface-ground border-round">
                <div class="flex align-items-center gap-2 overflow-hidden">
                    <i class="pi pi-file-excel text-primary text-2xl"></i>
                    <span class="text-sm text-700 text-overflow-ellipsis overflow-hidden white-space-nowrap font-medium">{{ getUploadedFile('wsp_business_csv').name }}</span>
                </div>
                <p-button icon="pi pi-times" [rounded]="true" [text]="true" severity="danger" (onClick)="removeFile('wsp_business_csv', csvUploader)"></p-button>
            </div>
            <small class="text-red-500" *ngIf="form.get('wsp_business_csv')?.invalid && form.get('wsp_business_csv')?.touched && !getUploadedFile('wsp_business_csv')">
                El archivo CSV es requerido
            </small>
        </div>

        <div class="flex justify-content-end gap-2 mt-4">
            <p-button label="Cancelar" styleClass="p-button-secondary" (onClick)="close()"></p-button>
            <p-button label="Guardar" type="submit" [disabled]="form.invalid"></p-button>
        </div>
    </form>
</div>
