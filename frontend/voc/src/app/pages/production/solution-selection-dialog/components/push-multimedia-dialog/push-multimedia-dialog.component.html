<div class="flex flex-column gap-4 p-4">
    <h3 class="text-xl font-semibold text-900">Push Multimedia Configuration</h3>
    
    <form [formGroup]="form" class="flex flex-column gap-4">
        <div class="flex flex-column gap-2">
            <label class="text-700">Texto Línea 1 (Max 25 chars, debe empezar con "Publicidad De:")</label>
            <input pInputText class="w-full" formControlName="push_textLine1" placeholder="Publicidad De: Marca" />
            <small *ngIf="form.get('push_textLine1')?.hasError('required') && form.get('push_textLine1')?.touched" class="text-red-500">Requerido.</small>
            <small *ngIf="form.get('push_textLine1')?.hasError('maxlength')" class="text-red-500">Máximo 25 caracteres.</small>
            <small *ngIf="form.get('push_textLine1')?.hasError('invalidPrefix')" class="text-red-500">Debe comenzar con "Publicidad De:".</small>
        </div>

        <div class="flex flex-column gap-2">
            <label class="text-700">Texto Línea 2 (Max 35 chars)</label>
            <input pInputText class="w-full" formControlName="push_textLine2" />
            <small *ngIf="form.get('push_textLine2')?.hasError('maxlength')" class="text-red-500">Máximo 35 caracteres.</small>
        </div>

        <div class="flex flex-column gap-2">
            <label class="text-700">URL Destino</label>
            <input pInputText class="w-full" formControlName="push_url" placeholder="https://..." />
            <small *ngIf="form.get('push_url')?.hasError('pattern')" class="text-red-500">URL inválida.</small>
        </div>

        <div class="flex flex-column gap-2">
            <label class="text-700">UTM (Opcional)</label>
            <input pInputText class="w-full" formControlName="push_utm" />
        </div>

        <div class="formgrid grid gap-4">
            <div class="col-12 md:col-6 flex flex-column gap-2">
                <label class="text-700">Banner (700x300 JPG)
                    <lucide-icon name="info" class="ml-2 text-primary cursor-pointer" pTooltip="El banner debe tener dimensiones exactas de 700x300 píxeles." tooltipPosition="top"></lucide-icon>
                </label>
                <p-fileUpload #bannerUploader
                    mode="basic" 
                    chooseLabel="Subir Banner" 
                    accept="image/jpeg, image/jpg" 
                    [maxFileSize]="2000000" 
                    (onSelect)="onUpload($event, 'banner', bannerUploader)"
                    [auto]="true">
                </p-fileUpload>
                <div *ngIf="getUploadedFile('banner')" class="flex align-items-center justify-content-between mt-2 p-2 surface-ground border-round">
                    <div class="flex align-items-center gap-2 overflow-hidden">
                        <img [src]="getUploadedFile('banner').safeUrl | cachedImage" alt="Banner Preview" style="max-height: 50px; max-width: 100px; object-fit: contain;" class="border-round" />
                        <span class="text-sm text-700 text-overflow-ellipsis overflow-hidden white-space-nowrap">{{ getUploadedFile('banner').name }}</span>
                    </div>
                    <p-button [rounded]="true" [text]="true" severity="danger" (onClick)="removeFile('banner', bannerUploader)"><lucide-icon name="x"></lucide-icon></p-button>
                </div>
            </div>
            <div class="col-12 md:col-6 flex flex-column gap-2">
                <label class="text-700">Logo (96x96 JPG)
                    <lucide-icon name="info" class="ml-2 text-primary cursor-pointer" pTooltip="El logo debe tener dimensiones exactas de 96x96 píxeles." tooltipPosition="top"></lucide-icon>
                </label>
                <p-fileUpload #logoUploader
                    mode="basic" 
                    chooseLabel="Subir Logo" 
                    accept="image/jpeg, image/jpg" 
                    [maxFileSize]="1000000" 
                    (onSelect)="onUpload($event, 'logo', logoUploader)"
                    [auto]="true">
                </p-fileUpload>
                <div *ngIf="getUploadedFile('logo')" class="flex align-items-center justify-content-between mt-2 p-2 surface-ground border-round">
                    <div class="flex align-items-center gap-2 overflow-hidden">
                        <img [src]="getUploadedFile('logo').safeUrl | cachedImage" alt="Logo Preview" style="max-height: 50px; max-width: 50px; object-fit: contain;" class="border-round" />
                        <span class="text-sm text-700 text-overflow-ellipsis overflow-hidden white-space-nowrap">{{ getUploadedFile('logo').name }}</span>
                    </div>
                    <p-button [rounded]="true" [text]="true" severity="danger" (onClick)="removeFile('logo', logoUploader)"><lucide-icon name="x"></lucide-icon></p-button>
                </div>
            </div>
        </div>
    </form>

    <div class="flex justify-content-end gap-2 mt-4">
        <p-button label="Cancelar" severity="secondary" (onClick)="cancel()"></p-button>
        <p-button label="Guardar" (onClick)="submit()" [loading]="isUploading()"></p-button>
    </div>
</div>
