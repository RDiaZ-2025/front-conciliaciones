<div class="flex flex-col gap-4 p-4">
    <h3 class="text-xl font-semibold text-white">Facebook & Instagram Configuration</h3>
    
    <form [formGroup]="form" class="flex flex-col gap-4">
        <div class="flex flex-col gap-2">
            <label class="text-gray-300">Texto Principal (Max 125 chars)</label>
            <textarea pTextarea formControlName="fb_primaryText" rows="2"></textarea>
            <small *ngIf="form.get('fb_primaryText')?.hasError('maxlength')" class="text-red-500">Máximo 125 caracteres.</small>
        </div>

        <div class="flex flex-col gap-2">
            <label class="text-gray-300">Título (Max 27 chars)</label>
            <input pInputText formControlName="fb_title" />
            <small *ngIf="form.get('fb_title')?.hasError('maxlength')" class="text-red-500">Máximo 27 caracteres.</small>
        </div>

        <div class="flex flex-col gap-2">
            <label class="text-gray-300">Descripción (Max 27 chars)</label>
            <input pInputText formControlName="fb_description" />
            <small *ngIf="form.get('fb_description')?.hasError('maxlength')" class="text-red-500">Máximo 27 caracteres.</small>
        </div>

        <div class="flex flex-col gap-2">
            <label class="text-gray-300">Multimedia (Imagen/Video)</label>
            <p-fileUpload 
                mode="basic" 
                chooseLabel="Subir Media" 
                accept="image/*,video/*" 
                [multiple]="true"
                [maxFileSize]="30000000" 
                (onSelect)="onUpload($event, 'fb_media')"
                [auto]="true">
            </p-fileUpload>
            <div *ngIf="uploadedFiles.length > 0" class="text-sm text-green-400">
                {{ uploadedFiles.length }} archivos subidos.
            </div>
        </div>
    </form>

    <div class="flex justify-end gap-2 mt-4">
        <p-button label="Cancelar" severity="secondary" (onClick)="cancel()"></p-button>
        <p-button label="Guardar" (onClick)="submit()" [loading]="isUploading()"></p-button>
    </div>
</div>
