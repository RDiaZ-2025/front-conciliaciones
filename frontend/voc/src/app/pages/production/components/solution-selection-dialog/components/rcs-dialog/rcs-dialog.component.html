<div class="flex flex-column gap-3 p-3">
    <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="field mb-4">
            <label class="font-bold block mb-2 text-xl text-900">Configuración RCS</label>
            <div class="p-3 surface-ground border-round-md shadow-1">
                <div class="text-700">Rich Communication Services (RCS) con capacidades multimedia.</div>
            </div>
        </div>

        <div class="field">
            <label for="rcs_agentData" class="font-bold block mb-2">
                Datos del Agente
                <i class="pi pi-info-circle ml-2 text-primary cursor-pointer" 
                   pTooltip="Información para crear el agente en Google (Nombre, Descripción, Color, etc.)" tooltipPosition="top"></i>
            </label>
            <textarea pTextarea id="rcs_agentData" formControlName="rcs_agentData" class="w-full" rows="3" placeholder="Ingrese los datos requeridos para el agente..."></textarea>
            <small *ngIf="form.get('rcs_agentData')?.invalid && (form.get('rcs_agentData')?.dirty || form.get('rcs_agentData')?.touched)" class="p-error block">
                Requerido.
            </small>
        </div>

        <div class="field">
            <label for="rcs_messageText" class="font-bold block mb-2">
                Texto del Mensaje
                <i class="pi pi-info-circle ml-2 text-primary cursor-pointer" 
                   pTooltip="Máximo 350 caracteres." tooltipPosition="top"></i>
            </label>
            <textarea pTextarea id="rcs_messageText" formControlName="rcs_messageText" class="w-full" rows="4" maxlength="350" placeholder="Mensaje principal..."></textarea>
            <div class="text-right text-sm text-500">{{form.get('rcs_messageText')?.value?.length || 0}} / 350</div>
        </div>

        <div class="field">
            <label for="rcs_redirectUrl" class="font-bold block mb-2">
                URL de Redirección (Opcional)
            </label>
            <input pInputText id="rcs_redirectUrl" formControlName="rcs_redirectUrl" class="w-full" placeholder="https://example.com" />
        </div>

        <div class="field">
            <label class="font-bold block mb-2">Tipo de Multimedia</label>
            <div class="flex gap-3">
                <div *ngFor="let type of mediaTypes" class="field-checkbox">
                    <p-radioButton [inputId]="type.value" name="rcs_mediaType" [value]="type.value" formControlName="rcs_mediaType"></p-radioButton>
                    <label [for]="type.value" class="ml-2">{{ type.label }}</label>
                </div>
            </div>
        </div>

        <!-- RCS Image Specifics -->
        <div *ngIf="form.get('rcs_mediaType')?.value === 'IMAGE'" class="pl-4 border-left-2 border-primary-500 mb-3">
            <div class="field">
                <label for="rcs_image_caption" class="font-bold block mb-2">Caption (Título)</label>
                <input pInputText id="rcs_image_caption" formControlName="rcs_image_caption" class="w-full" maxlength="25" />
            </div>
            <div class="field">
                <label for="rcs_image_button_label" class="font-bold block mb-2">Texto del Botón</label>
                <input pInputText id="rcs_image_button_label" formControlName="rcs_image_button_label" class="w-full" maxlength="25" />
            </div>
            <div class="field">
                <label for="rcs_image_button_url" class="font-bold block mb-2">URL del Botón</label>
                <input pInputText id="rcs_image_button_url" formControlName="rcs_image_button_url" class="w-full" placeholder="https://..." />
            </div>
        </div>

        <!-- Buttons Array -->
        <div class="field mt-4">
            <div class="flex justify-content-between align-items-center mb-2">
                <label class="font-bold block">Botones de Acción (Máx 4)</label>
                <p-button label="Agregar Botón" icon="pi pi-plus" size="small" [outlined]="true" (onClick)="addRcsButton()" [disabled]="rcsButtons.length >= 4"></p-button>
            </div>
            
            <div formArrayName="rcs_buttons">
                <div *ngFor="let btn of rcsButtons.controls; let i=index" [formGroupName]="i" class="p-3 surface-card border-round mb-2 shadow-1 relative">
                    <div class="grid p-fluid">
                        <div class="col-12 md:col-4">
                            <label class="block text-sm font-bold mb-1">Etiqueta</label>
                            <input pInputText formControlName="label" placeholder="Texto del botón" maxlength="25" />
                        </div>
                        <div class="col-12 md:col-3">
                            <label class="block text-sm font-bold mb-1">Tipo</label>
                            <p-select [options]="[{label:'URL', value:'URL'}, {label:'Teléfono', value:'PHONE'}]" formControlName="type" appendTo="body"></p-select>
                        </div>
                        <div class="col-12 md:col-5">
                            <label class="block text-sm font-bold mb-1">Valor</label>
                            <input pInputText formControlName="value" placeholder="https://... o Teléfono" />
                        </div>
                    </div>
                    <button pButton icon="pi pi-trash" class="p-button-rounded p-button-danger p-button-text absolute top-0 right-0 mt-2 mr-2" (click)="removeRcsButton(i)"></button>
                </div>
            </div>
        </div>

        <div class="field mt-3">
            <label class="font-bold block mb-2">
                Archivos Multimedia
                <i class="pi pi-info-circle ml-2 text-primary cursor-pointer" 
                   pTooltip="Imagen (JPG/PNG) o Video (MP4). Verifique los requisitos según el tipo seleccionado." tooltipPosition="top"></i>
            </label>
            <p-fileupload mode="advanced" chooseLabel="Seleccionar Archivos" [accept]="fileAccept" 
                [maxFileSize]="maxFileSize" [customUpload]="true" (uploadHandler)="onUpload($event)" 
                [auto]="true" [multiple]="true"></p-fileupload>
            
            <div *ngFor="let file of uploadedFiles" class="mt-2 text-sm text-green-500 flex align-items-center gap-2">
                <i class="pi pi-check-circle"></i> {{file.name}} ({{(file.size/1024).toFixed(2)}} KB)
            </div>
        </div>

        <div class="flex justify-content-end gap-2 mt-4">
            <p-button label="Cancelar" icon="pi pi-times" styleClass="p-button-text" (onClick)="cancel()"></p-button>
            <p-button label="Guardar y Continuar" icon="pi pi-check" type="submit" [disabled]="form.invalid || isUploading()"></p-button>
        </div>
    </form>
</div>
