<div class="flex flex-column gap-3 p-3">
    <div class="text-center mb-3">
        <lucide-icon name="help-circle" class="text-5xl text-primary mb-3"></lucide-icon>
        <div class="font-bold text-xl mb-2">Confirmar Venta</div>
        <div class="text-color-secondary">¿La campaña se vendió exitosamente?</div>
    </div>

    <div class="flex flex-column gap-2">
        <button pButton class="p-button-success action-button" (click)="close('sold')"><lucide-icon name="check" class="mr-2"></lucide-icon>Sí, vendida</button>

        <button pButton class="p-button-danger action-button" (click)="close('not_sold')"><lucide-icon name="x" class="mr-2"></lucide-icon>No, no vendida</button>

        <button pButton class="p-button-secondary p-button-text action-button mt-2" (click)="close('cancel')"><lucide-icon name="ban" class="mr-2"></lucide-icon>Cancelar</button>
    </div>
</div>
