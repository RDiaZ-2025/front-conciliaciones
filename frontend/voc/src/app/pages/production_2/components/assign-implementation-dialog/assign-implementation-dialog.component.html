<div class="flex flex-column gap-3 p-3">
  <form [formGroup]="form" class="flex flex-column gap-3">
    
    <!-- Unit Selection -->
    <div class="field">
      <label for="unit" class="font-bold block mb-2">
        Unidad
      </label>
      <p-select 
        id="unit" 
        [options]="unitOptions" 
        formControlName="unit" 
        optionLabel="label"
        optionValue="value"
        placeholder="Seleccione una unidad" 
        [style]="{'width':'100%'}"
        appendTo="body">
      </p-select>
      <small *ngIf="form.get('unit')?.invalid && form.get('unit')?.touched" class="p-error block">
        La unidad es requerida.
      </small>
    </div>

    <!-- User Selection -->
    <div class="field">
      <label for="assignedUser" class="font-bold block mb-2">
        Usuario de Implementación (Operaciones)
      </label>
      <p-select 
        id="assignedUser" 
        [options]="users()" 
        formControlName="assignedUser" 
        optionLabel="name"
        optionValue="id"
        placeholder="Seleccione un usuario" 
        [style]="{'width':'100%'}"
        appendTo="body"
        [loading]="isLoadingUsers()">
      </p-select>
      <small *ngIf="form.get('assignedUser')?.invalid && form.get('assignedUser')?.touched" class="p-error block">
        El usuario es requerido.
      </small>
    </div>

  </form>

  <div class="flex justify-content-end gap-2 mt-4 pt-3 border-top-1 surface-border">
    <p-button label="Cancelar" icon="pi pi-times" [outlined]="true" severity="secondary" (click)="cancel()"></p-button>
    <p-button label="Guardar" icon="pi pi-check" (click)="confirm()" [disabled]="form.invalid"></p-button>
  </div>
</div>
