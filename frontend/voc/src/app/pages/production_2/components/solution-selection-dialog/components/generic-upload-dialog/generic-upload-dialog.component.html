<div class="flex flex-column gap-4 p-4">
    <h3 class="text-xl font-semibold text-900 m-0">Carga de Material: {{ solutionType() }}</h3>
    
    <div class="surface-ground p-3 border-round border-1 surface-border">
        <p class="text-sm text-700 m-0"><i class="pi pi-info-circle mr-2 text-primary"></i>{{ instructions() }}</p>
    </div>
    
    <form [formGroup]="form" class="flex flex-column gap-4">
        <div class="flex flex-column gap-2">
            <label class="text-700 font-medium">Archivos</label>
            <p-fileUpload #uploader
                mode="basic" 
                chooseLabel="Subir Archivos" 
                [multiple]="true"
                [maxFileSize]="50000000" 
                (onSelect)="onUpload($event, uploader)"
                [auto]="true">
            </p-fileUpload>

            <div *ngIf="uploadedFiles.length > 0" class="flex flex-column gap-2 mt-2">
                <div *ngFor="let file of uploadedFiles; let i = index" class="flex align-items-center justify-content-between p-2 surface-ground border-round">
                    <div class="flex align-items-center gap-2 overflow-hidden">
                        <img *ngIf="file.safeUrl" [src]="file.safeUrl" alt="Preview" style="max-height: 40px; max-width: 40px; object-fit: contain;" class="border-round" />
                        <i *ngIf="!file.safeUrl" class="pi pi-file text-primary text-xl"></i>
                        <span class="text-sm text-700 text-overflow-ellipsis overflow-hidden white-space-nowrap font-medium" [title]="file.name">{{ file.name }}</span>
                    </div>
                    <p-button icon="pi pi-times" [rounded]="true" [text]="true" severity="danger" (onClick)="removeFile(i)"></p-button>
                </div>
            </div>
        </div>
    </form>

    <div class="flex justify-content-end gap-2 mt-4">
        <p-button label="Cancelar" severity="secondary" (onClick)="cancel()"></p-button>
        <p-button label="Guardar" (onClick)="submit()" [loading]="isUploading()"></p-button>
    </div>
</div>
