<div class="flex flex-column gap-4 p-4 fadein animation-duration-300 w-full max-w-7xl mx-auto">
    
    <!-- Header & Global Filters -->
    <div class="flex flex-column gap-3 w-full">
        <app-page-header title="Dashboard Red+" subtitle="Analítica de contenido y audiencia"
            icon="bar-chart-3" class="w-full"></app-page-header>

        <!-- Main Filters Component -->
        <div class="w-full">
            <app-dashboard-filters [options]="filtersOptions" [filters]="filters" [visibleFilters]="visibleFilters"
                (filterChange)="onFilterChange($event)" (clear)="onClearFilters()">
            </app-dashboard-filters>
        </div>
    </div>

    <!-- Tab Navigation - Standard Capsule style -->
    <div class="surface-card p-1 border-round-xl border-1 surface-border shadow-2 flex flex-wrap gap-2 max-w-fit mb-2">
        <p-button label="Resumen"  [variant]="activeTab === 'overview' ? undefined : 'text'" [severity]="activeTab === 'overview' ? 'primary' : 'secondary'" (onClick)="setTab('overview')"></p-button>
        <p-button label="Contenido"  [variant]="activeTab === 'content' ? undefined : 'text'" [severity]="activeTab === 'content' ? 'primary' : 'secondary'" (onClick)="setTab('content')"></p-button>
        <p-button label="Entidades"  [variant]="activeTab === 'entities' ? undefined : 'text'" [severity]="activeTab === 'entities' ? 'primary' : 'secondary'" (onClick)="setTab('entities')"></p-button>
        <p-button label="Alcance" icon="bar-chart-3" [variant]="activeTab === 'reach' ? undefined : 'text'" [severity]="activeTab === 'reach' ? 'primary' : 'secondary'" (onClick)="setTab('reach')"></p-button>
        <p-button label="Audiencia"  [variant]="activeTab === 'audience' ? undefined : 'text'" [severity]="activeTab === 'audience' ? 'primary' : 'secondary'" (onClick)="setTab('audience')"></p-button>
    </div>

    <!-- Standard Loading State (for initial load) -->
    <div *ngIf="isLoading" class="space-y-8 animate-pulse">
        <!-- KPI Skeletons -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-6">
            <div *ngFor="let i of [1,2,3,4,5,6]"
                class="surface-card p-4 rounded-3xl border border-muted h-36 relative overflow-hidden">
                <div class="skeleton skeleton-text w-24 bg-white/10 rounded-lg"></div>
                <div class="skeleton skeleton-title w-16 bg-white/20 rounded-lg h-10"></div>
                <div class="skeleton skeleton-text w-32 mt-auto bg-white/5 rounded-lg"></div>
            </div>
        </div>
        <!-- Main Content Skeletons -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 surface-card rounded-[32px] border border-muted p-4 h-[500px]">
                <div class="skeleton skeleton-title w-64 mb-8 bg-white/10 h-12 rounded-2xl"></div>
                <div class="skeleton skeleton-chart bg-white/5 h-[350px] rounded-3xl"></div>
            </div>
            <div class="space-y-6">
                <div *ngFor="let i of [1,2,3,4]" class="surface-card rounded-2xl border border-muted p-4 h-32">
                    <div class="skeleton skeleton-text w-20 bg-white/10"></div>
                    <div class="skeleton skeleton-title w-32 bg-white/20"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Content Tabs -->
    <div [hidden]="isLoading || hasError" class="animate-fade-in-up">
        <app-overview-tab *ngIf="activeTab === 'overview'" [data]="overviewData"
            (drillDown)="onDrillDown($event)"></app-overview-tab>
        <app-content-tab *ngIf="activeTab === 'content'" [data]="contentData"
            (drillDown)="onDrillDown($event)"></app-content-tab>
        <app-entities-tab *ngIf="activeTab === 'entities'" [data]="entitiesData" [currentFilters]="filters"
            (drillDown)="onDrillDown($event)"></app-entities-tab>
        <app-reach-tab *ngIf="activeTab === 'reach'" [data]="reachData"
            (drillDown)="onDrillDown($event)"></app-reach-tab>
        <app-audience-tab *ngIf="activeTab === 'audience'" [data]="audienceData"
            (drillDown)="onDrillDown($event)"></app-audience-tab>
    </div>

    <!-- Error State -->
    <div *ngIf="hasError && !isLoading"
        class="surface-card border-2 border-red-500/20 p-4 border-round-xl text-center max-w-2xl mx-auto my-20 shadow-2xl">
        <div class="w-16 h-16 bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-4">
            <lucide-icon name="alert-triangle" class="text-red-500 text-3xl"></lucide-icon>
        </div>
        <h2 class="text-2xl font-bold text-main mb-2">Error de Sincronización</h2>
        <p class="text-muted font-medium mb-6 text-lg">No pudimos establecer conexión con la red de datos. Por favor, intenta de nuevo en unos momentos.</p>
        <p-button (onClick)="loadData()"><lucide-icon name="refresh-cw" class="mr-2"></lucide-icon>Reintentar Conexión</p-button>
    </div>

</div>
