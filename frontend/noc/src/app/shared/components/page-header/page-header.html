<div class="flex flex-column md:flex-row md:align-items-center justify-content-between gap-3">
    <div class="flex align-items-center gap-3">
        <div class="flex align-items-center justify-content-center border-round bg-primary text-white animate-pulse-glow"
            style="width: 48px; height: 48px; border-radius: var(--radius-sm);">
            <i [class]="icon + ' text-2xl'"></i>
        </div>
        <div class="flex flex-column">
            <h1 class="m-0 text-3xl font-bold text-main">{{ title }}</h1>
            <p class="m-0 text-muted mt-1">{{ subtitle }}</p>
        </div>
    </div>

    <div class="flex gap-2">
        <ng-content></ng-content>
    </div>
</div>
